name: CI

# What: run the layered test suite + import smoke tests on every push/PR to main.
# Why: no CI previously existed, and no test exercised the entrypoints — which is how a
#      hard import break (orchestrator.py, stat_report.py) shipped undetected. This is the
#      cheapest guard for everything that follows in the TDD plan (docs/TDD_PLAN.md, E3.2).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    # Blocking job: core dependencies only. Optional model runtimes (torch/darts/chaospy)
    # are import-guarded and fail soft, so their absence must NOT fail the suite
    # (model-dependent tests skip — see tests/integration/test_integration.py).
    name: Core tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (editable) + MILP extra + coverage
        run: |
          python -m pip install --upgrade pip
          pip install -e .[milp] coverage

      - name: Run test suite with coverage
        run: |
          coverage run run_tests.py
          coverage report --include="src/dynamix/*,opt/*"

  optional:
    # Non-blocking job: exercises the optional-dependency layer (e.g. PCE-NARX via chaospy,
    # MILP via pulp). These deps are heavy or platform-sensitive, so a failure here is
    # informational and must not block merges.
    name: Optional-deps tests (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + optional (PCE / MILP) dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[milp] chaospy

      - name: Run full suite including optional layer
        run: python run_tests.py --include-optional

  lockfile:
    # Blocking job: prove the committed lockfile installs on the supported Python range and
    # that the package imports against the pinned dependency set.
    name: Lockfile install (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install from requirements.lock + package (no deps)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e . --no-deps

      - name: Smoke-import the package against the locked deps
        run: python -c "import dynamix.constants, dynamix.stat, opt.opt_config; print('lock install OK')"
